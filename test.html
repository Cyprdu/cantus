<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Hochement de Tête - MediaPipe</title>
    <!-- Scripts MediaPipe Face Mesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h2 {
            margin-bottom: 10px;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
        }
        .container {
            position: relative;
            width: 640px;
            max-width: 95vw;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #nod-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e05050;
            border: 2px solid rgba(255,255,255,0.3);
            transition: background 150ms ease, transform 150ms ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #nod-indicator.active {
            background: #6dab6d;
            transform: scale(1.25);
            box-shadow: 0 0 16px #6dab6d;
        }
        .info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h2>Test de Hochement de Tête Conséquent</h2>
    <div class="container">
        <video id="webcam" playsinline></video>
        <canvas id="output-canvas"></canvas>
        <div id="nod-indicator" title="Indicateur de hochement de tête"></div>
    </div>
    <div class="info" id="status-text">Initialisation de la caméra et du modèle...</div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const indicator = document.getElementById('nod-indicator');
        const statusText = document.getElementById('status-text');

        let indicatorTimeout = null;
        let lastNodTime = 0;

        // Variables pour la détection d'amplitude du geste
        let noseYHistory = [];
        const HISTORY_SIZE = 15; // Fenêtre d'analyse de ~0.5s
        
        function triggerNodIndicator() {
            indicator.classList.add('active');
            clearTimeout(indicatorTimeout);
            indicatorTimeout = setTimeout(() => {
                indicator.classList.remove('active');
            }, 500);
        }

        function onResults(results) {
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                statusText.textContent = "Visage détecté - Faites un hochement de tête bien marqué vers le bas";
                const landmarks = results.multiFaceLandmarks[0];

                // Point 1 : Bout du nez | Point 10 : Haut du front | Point 152 : Bas du menton
                const noseY = landmarks[1].y;
                const foreheadY = landmarks[10].y;
                const chinY = landmarks[152].y;
                
                // Calcul de la taille relative du visage (pour annuler l'effet de distance par rapport à l'écran)
                const faceHeight = Math.abs(chinY - foreheadY);
                const relativeNoseY = noseY / faceHeight;

                // Historique glissant
                noseYHistory.push(relativeNoseY);
                if (noseYHistory.length > HISTORY_SIZE) {
                    noseYHistory.shift();
                }

                const now = Date.now();
                const maxY = Math.max(...noseYHistory);
                const minY = Math.min(...noseYHistory);
                const deltaY = maxY - minY;

                // Seuil d'amplitude : 0.22 signifie que le nez doit bouger d'au moins 22% de la hauteur totale du visage
                const THRESHOLD = 0.22; 

                // Anti-rebond de 1.2s pour éviter de tourner plusieurs pages pendant le même mouvement
                if (deltaY > THRESHOLD && (now - lastNodTime > 1200)) {
                    lastNodTime = now;
                    triggerNodIndicator();
                    statusText.textContent = "Hochement de tête conséquent détecté !";
                    noseYHistory = []; // Réinitialise l'historique après détection
                }

            } else {
                statusText.textContent = "Aucun visage détecté. Placez-vous face à la caméra.";
                noseYHistory = [];
            }

            canvasCtx.restore();
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });

        camera.start()
            .then(() => {
                statusText.textContent = "Caméra active. Hochez la tête fermement !";
            })
            .catch(err => {
                statusText.textContent = "Erreur d'accès à la caméra : " + err.message;
                console.error(err);
            });
    </script>
</body>
</html>
