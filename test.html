<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Double Clin d'œil - MediaPipe</title>
    <!-- Scripts MediaPipe Face Mesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h2 {
            margin-bottom: 10px;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
        }
        .container {
            position: relative;
            width: 640px;
            max-width: 95vw;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            border: 1px solid #333;
        }
        video {
            display: none;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        #blink-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e05050;
            border: 2px solid rgba(255,255,255,0.3);
            transition: background 150ms ease, transform 150ms ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #blink-indicator.active {
            background: #6dab6d;
            transform: scale(1.25);
            box-shadow: 0 0 16px #6dab6d;
        }
        .info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h2>Test de Double Clin d'Œil</h2>
    <div class="container">
        <video id="webcam" playsinline></video>
        <canvas id="output-canvas"></canvas>
        <div id="blink-indicator" title="Indicateur de double clin d'œil"></div>
    </div>
    <div class="info" id="status-text">Initialisation de la caméra et du modèle...</div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const indicator = document.getElementById('blink-indicator');
        const statusText = document.getElementById('status-text');

        let blinkCount = 0;
        let firstBlinkTimestamp = 0;
        let lastBlinkDetectTime = 0;
        let indicatorTimeout = null;

        function triggerBlinkIndicator() {
            indicator.classList.add('active');
            clearTimeout(indicatorTimeout);
            indicatorTimeout = setTimeout(() => {
                indicator.classList.remove('active');
            }, 400);
        }

        function onResults(results) {
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                statusText.textContent = "Visage détecté - Faites un double clin d'œil rapide";
                const landmarks = results.multiFaceLandmarks[0];

                const rightEyeDist = Math.abs(landmarks[159].y - landmarks[145].y);
                const leftEyeDist  = Math.abs(landmarks[386].y - landmarks[374].y);

                const threshold = 0.012;
                const now = Date.now();

                // Détection de la fermeture des yeux avec anti-rebond unitaire (300ms entre deux clignements distincts)
                const isEyesClosed = (rightEyeDist < threshold || leftEyeDist < threshold);

                if (isEyesClosed && (now - lastBlinkDetectTime > 300)) {
                    lastBlinkDetectTime = now;

                    if (blinkCount === 0) {
                        blinkCount = 1;
                        firstBlinkTimestamp = now;
                    } else if (blinkCount === 1) {
                        // Fenêtre de temps pour valider le second clin d'œil (entre 150ms et 800ms après le premier)
                        const elapsed = now - firstBlinkTimestamp;
                        if (elapsed > 150 && elapsed < 800) {
                            triggerBlinkIndicator();
                            statusText.textContent = "Double clin d'œil détecté avec succès !";
                            blinkCount = 0; // Réinitialisation
                        } else if (elapsed >= 800) {
                            // Trop lent, on redémarre un nouveau cycle avec ce nouveau clignement
                            blinkCount = 1;
                            firstBlinkTimestamp = now;
                        }
                    }
                }

                // Si le délai entre le 1er et le 2nd dépasse 800ms, on réinitialise
                if (blinkCount === 1 && (now - firstBlinkTimestamp > 800)) {
                    blinkCount = 0;
                }

            } else {
                statusText.textContent = "Aucun visage détecté. Placez-vous face à la caméra.";
            }

            canvasCtx.restore();
        }

        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });

        camera.start()
            .then(() => {
                statusText.textContent = "Caméra active. Faites un double clin d'œil !";
            })
            .catch(err => {
                statusText.textContent = "Erreur d'accès à la caméra : " + err.message;
                console.error(err);
            });
    </script>
</body>
</html>
